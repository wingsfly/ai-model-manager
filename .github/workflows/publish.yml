name: Publish to PyPI

# Publishes ONLY on an explicit release — never on a normal push.
#   • Create a GitHub Release (tag e.g. v0.2.1)  → auto build + publish
#   • Or run this workflow manually from the Actions tab (workflow_dispatch)
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ai-model-manager
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC) — no token stored
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
